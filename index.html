<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8">
    <title>Zoom Musical</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/css/materialize.min.css">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Siempre con la mejor musica">
    <meta name="theme-color" content="#121211">
    <meta name="MobileOptimized" content="width">
    <meta name="HandheldFriendly" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="./img/logo.png">
    <link rel="apple-touch-startup-image" href="./img/logo.png">
    <link rel="manifest" href="./manifest.json">

    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh; /* CORREGIDO */
        background: url('https://blogger.googleusercontent.com/img/a/AVvXsEgEdK0MxogfLTNy2XCuF7nWxsVpBPOvC8zYZ39bdPpL3k3k12QpgSSe8W55G4-pxYyHtUW--ZCh56yBGmZZj9axdJVsjMEOTsXasSr_sf5WmIbCy5a-qEjKMlIs40J3bKdW5cbiRPBVWQM3aOtQhk0ulTrloWM4sMn_LJxKqi5MadH3SEjW83JHUWVL-44=s1600') no-repeat center center fixed;
        background-size: cover;
        font-family: Arial, sans-serif;
        color: #f9f584;
      }

      .player {
        text-align: center;
        width: 90%;
        max-width: 320px; /* MEJORADO */
        padding: 10px;
      }

      .vinyl {
        position: relative;
        width: 60vw; /* RESPONSIVE */
        height: 60vw;
        max-width: 220px;
        max-height: 220px;
        margin: 0 auto;
        border-radius: 50%;
        background: #000;
        border: 5px solid #555;
        box-sizing: border-box;
        animation: spin 3s linear infinite;
        animation-play-state: paused;
        transition: all 0.3s ease-in-out;
      }

      .vinyl img {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70%;
        height: 70%;
        border-radius: 50%;
      }

      .controls {
        margin-top: 20px;
      }

      .play-pause-btn {
        background-color: #5e2760;
        color: white;
        font-size: clamp(14px, 2.5vw, 18px); /* RESPONSIVE */
        padding: 10px clamp(15px, 5vw, 25px);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.3s ease;
      }

      .play-pause-btn:hover {
        background-color: #d97d6e;
        transform: scale(1.1);
      }

      .volume-container {
        margin: 20px auto;
        width: 80%; /* MEJORADO */
        max-width: 250px;
        text-align: center;
      }

      .volume-bar {
        width: 100%;
        height: 10px;
        background-color: #ddd;
        border-radius: 5px;
        position: relative;
        box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.3);
      }

      .volume-bar-fill {
        height: 100%;
        background-color: red;
        border-radius: 5px;
        width: 50%;
      }

      .volume-thumb {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background-color: red;
        border: 1px solid #fff;
        cursor: pointer;
      }

      .metadata {
        margin-top: 10px;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .scrolling-container {
        margin: 20px auto;
        width: 80%;
        max-width: 300px;
        overflow: hidden;
        background: linear-gradient(90deg, #6a11cb94, #2575fc42);
        border-radius: 10px;
        padding: 10px;
        text-align: center;
      }

      .scrolling-text {
        display: inline-block;
        white-space: nowrap;
        font-size: clamp(14px, 2.5vw, 18px); /* RESPONSIVE */
        color: #fff;
        font-weight: bold;
        animation: scroll-left 10s linear infinite;
      }

      @keyframes scroll-left {
        from { transform: translateX(100%); }
        to { transform: translateX(-100%); }
      }
    </style>
  </head>

  <body>
    <div class="player">
      <div class="vinyl" id="vinyl">
        <img id="cover" src="https://i.ibb.co/kDyKn2V/512-2-2.jpg" alt="Album Cover" />
      </div>

      <div class="metadata">
        <h4 id="title">ZOOM MUSICAL</h4>
      </div>

      <div class="controls">
        <button id="play-pause" class="play-pause-btn">Play</button>
      </div>

      <br/>

      <div class="volume-container">
        <div class="volume-bar" id="volume-bar">
          <div class="volume-bar-fill" id="volume-fill"></div>
          <div class="volume-thumb" id="volume-thumb"></div>
        </div>

      <br/>
      <br/>

      <div class="scrolling-container">
        <div class="scrolling-text">Gracias por escucharnos...</div>
      </div>

      <audio id="audio" src="---------------" preload="auto" crossorigin="anonymous"></audio>
    </div>

    <script>
      const audio = document.getElementById('audio');
      const playPauseButton = document.getElementById('play-pause');
      const vinyl = document.getElementById('vinyl');
      const volumeBar = document.getElementById('volume-bar');
      const volumeFill = document.getElementById('volume-fill');
      const volumeThumb = document.getElementById('volume-thumb');

      let volume = 0.5;
      audio.volume = volume;
      volumeFill.style.width = `${volume * 100}%`;
      volumeThumb.style.left = `${volume * 100}%`;

      const updateVolume = (e) => {
        const rect = volumeBar.getBoundingClientRect();
        const offsetX = e.clientX - rect.left;
        volume = Math.min(Math.max(offsetX / rect.width, 0), 1);
        audio.volume = volume;
        volumeFill.style.width = `${volume * 100}%`;
        volumeThumb.style.left = `${volume * 100}%`;
      };

      volumeThumb.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const mouseMoveHandler = (e) => updateVolume(e);
        const mouseUpHandler = () => {
          document.removeEventListener('mousemove', mouseMoveHandler);
          document.removeEventListener('mouseup', mouseUpHandler);
        };
        document.addEventListener('mousemove', mouseMoveHandler);
        document.addEventListener('mouseup', mouseUpHandler);
      });

      volumeBar.addEventListener('click', updateVolume);

      playPauseButton.addEventListener('click', () => {
        if (audio.paused) {
          audio.play();
          playPauseButton.textContent = 'Pause';
          vinyl.style.animationPlayState = 'running';
        } else {
          audio.pause();
          playPauseButton.textContent = 'Play';
          vinyl.style.animationPlayState = 'paused';
        }
      });
    </script>
  </body>
</html>
